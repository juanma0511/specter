<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MD3 Color Variables</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--md-sys-color-surface, #fff);
      color: var(--md-sys-color-on-surface, #000);
      padding: 24px;
      transition: background .2s, color .2s;
    }

    h1 { font-size: 1.5rem; margin-bottom: 4px; }
    .subtitle { opacity: .6; margin-bottom: 24px; font-size: .9rem; }

    .controls {
      display: flex; gap: 12px; align-items: center;
      margin-bottom: 24px; flex-wrap: wrap;
    }
    .controls label { font-size: .85rem; font-weight: 500; }
    .controls input[type="color"] {
      width: 40px; height: 40px; border: none; border-radius: 8px;
      cursor: pointer; padding: 0;
    }
    .controls select {
      padding: 8px 12px; border-radius: 8px; border: 1px solid;
      background: transparent; color: inherit; font-size: .85rem;
    }

    .section-title {
      font-size: 1.1rem; font-weight: 600; margin: 24px 0 8px;
      padding-bottom: 4px; border-bottom: 2px solid currentColor; opacity: .7;
    }

    .grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 8px;
    }

    .card {
      display: flex; align-items: stretch; gap: 0;
      border-radius: 12px; overflow: hidden;
      background: var(--md-sys-color-surface-container, #f0f0f0);
      outline: 1px solid var(--md-sys-color-outline-variant, #ddd);
    }

    .swatch {
      width: 64px; min-height: 64px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: .65rem; font-weight: 600; text-align: center;
      padding: 4px; word-break: break-all;
    }

    .info {
      padding: 8px 12px; flex: 1; display: flex;
      flex-direction: column; justify-content: center; gap: 2px;
      min-width: 0;
    }
    .var-name {
      font-family: 'SF Mono', 'Fira Code', monospace; font-size: .8rem;
      word-break: break-all;
    }
    .var-hex {
      font-size: .75rem; opacity: .6; font-family: monospace;
    }

    .on-primary { color: var(--md-sys-color-on-primary, #fff); }
    .on-secondary { color: var(--md-sys-color-on-secondary, #fff); }
    .on-tertiary { color: var(--md-sys-color-on-tertiary, #fff); }
    .on-error { color: var(--md-sys-color-on-error, #fff); }
  </style>
</head>
<body>
  <h1>MD3 Color Variables</h1>
  <p class="subtitle">Material Design 3 — full color scheme visualizer</p>

  <div class="controls">
    <label>Seed</label>
    <input type="color" id="seedPicker" value="#1b6ef3" />
    <label>Mode</label>
    <select id="modeSelect">
      <option value="dark" selected>Dark</option>
      <option value="light">Light</option>
    </select>
  </div>

  <div id="app"></div>

  <script>
    window.copyVar = function(el) {
      const hex = el.dataset.hex;
      const varName = el.dataset.var;
      const text = hex ? `${varName} → ${hex}` : varName;
      navigator.clipboard.writeText(text).then(() => {
        const orig = el.style.outline;
        el.style.outline = '2px solid var(--md-sys-color-primary, #00f)';
        setTimeout(() => el.style.outline = orig, 600);
      }).catch(() => {});
    };
  </script>
  <script type="module">
    import { CorePalette, Scheme } from '@material/material-color-utilities';

    const GROUPS = {
      Primary: ['primary', 'on-primary', 'primary-container', 'on-primary-container'],
      Secondary: ['secondary', 'on-secondary', 'secondary-container', 'on-secondary-container'],
      Tertiary: ['tertiary', 'on-tertiary', 'tertiary-container', 'on-tertiary-container'],
      Error: ['error', 'on-error', 'error-container', 'on-error-container'],
      Surface: ['surface', 'on-surface', 'surface-dim', 'surface-bright',
                'surface-container-lowest', 'surface-container-low', 'surface-container',
                'surface-container-high', 'surface-container-highest',
                'on-surface-variant'],
      Background: ['background', 'on-background'],
      Outline: ['outline', 'outline-variant'],
      Inverse: ['inverse-surface', 'inverse-on-surface', 'inverse-primary'],
      Other: ['shadow', 'scrim'],
    };

    const seedPicker = document.getElementById('seedPicker');
    const modeSelect = document.getElementById('modeSelect');
    const app = document.getElementById('app');

    function render() {
      const seed = parseInt(seedPicker.value.slice(1), 16) | 0xFF000000;
      const isDark = modeSelect.value === 'dark';
      const scheme = isDark ? Scheme.dark(seed) : Scheme.light(seed);
      const props = scheme.toJSON();

      const core = CorePalette.contentOf(seed);
      const n1 = core.n1;
      if (isDark) {
        props.surfaceContainerLowest = n1.tone(4);
        props.surfaceContainerLow = n1.tone(10);
        props.surfaceContainer = n1.tone(12);
        props.surfaceContainerHigh = n1.tone(17);
        props.surfaceContainerHighest = n1.tone(22);
      } else {
        props.surfaceContainerLowest = n1.tone(100);
        props.surfaceContainerLow = n1.tone(96);
        props.surfaceContainer = n1.tone(94);
        props.surfaceContainerHigh = n1.tone(92);
        props.surfaceContainerHighest = n1.tone(90);
      }

      document.documentElement.style.colorScheme = isDark ? 'dark' : 'light';
      const root = document.documentElement;
      for (const [key, value] of Object.entries(props)) {
        const cssKey = '--md-sys-color-' + key.replace(/([A-Z])/g, '-$1').toLowerCase();
        root.style.setProperty(cssKey, '#' + (value & 0x00FFFFFF).toString(16).padStart(6, '0'));
      }

      let html = '';
      for (const [group, tokens] of Object.entries(GROUPS)) {
        html += `<div class="section-title">${group}</div><div class="grid">`;
        for (const token of tokens) {
          const cssVar = `--md-sys-color-${token}`;
          const hex = root.style.getPropertyValue(cssVar).trim();
          let textColor = 'inherit';
          const isOn = token.startsWith('on-');
          if (isOn && hex) {
            const bright = luminance(hex);
            textColor = bright > 0.5 ? '#000' : '#fff';
          } else if (isOn) {
            textColor = 'inherit';
          }

          html += `
            <div class="card" tabindex="0" role="button"
                 data-var="--md-sys-color-${token}" data-hex="${hex || ''}"
                 onclick="copyVar(this)">
              <div class="swatch" style="background:${hex};color:${textColor}">
                ${hex || '—'}
              </div>
              <div class="info">
                <div class="var-name">--md-sys-color-${token}</div>
                <div class="var-hex">${hex || 'not set'}</div>
              </div>
            </div>
          `;
        }
        html += `</div>`;
      }
      app.innerHTML = html;
    }

    function luminance(hex) {
      const r = parseInt(hex.slice(1,3), 16) / 255;
      const g = parseInt(hex.slice(3,5), 16) / 255;
      const b = parseInt(hex.slice(5,7), 16) / 255;
      const a = [r,g,b].map(v => v <= 0.03928 ? v/12.92 : Math.pow((v+0.055)/1.055, 2.4));
      return 0.2126 * a[0] + 0.7152 * a[1] + 0.0722 * a[2];
    }

    seedPicker.addEventListener('input', render);
    modeSelect.addEventListener('change', render);
    render();
  </script>
</body>
</html>
